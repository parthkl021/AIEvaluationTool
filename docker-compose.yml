services:
  db:
    image: mariadb:11
    container_name: aiet-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_password}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-aievaluationtool}
      MARIADB_USER: ${MARIADB_USER:-aiet_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-aiet_password}
    expose:
      - "3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${MARIADB_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 12

  selenium-browser:
    image: selenium/standalone-chrome:latest
    container_name: aiet-selenium
    restart: unless-stopped
    shm_size: 2gb
    environment:
      SE_VNC_NO_PASSWORD: "1"
    expose:
      - "4444"
      - "7900"

  interface-manager:
    build:
      context: .
      dockerfile: Dockerfile.app-backend
      target: interface-manager
    container_name: aiet-interface-manager
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      selenium-browser:
        condition: service_started
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - interface_manager_logs:/app/src/app/interface_manager/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.app-backend
      target: auth-service
    container_name: aiet-auth-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "7500"
    env_file:
      - .env
    environment:
      TCE_APP_URL: ${TCE_APP_URL:-/}
      TDMS_APP_URL: ${TDMS_APP_URL:-/tdms/dashboard}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7500/docs', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  app-backend:
    build:
      context: .
      dockerfile: Dockerfile.app-backend
      target: app-backend
    container_name: aiet-app-backend
    restart: unless-stopped
    depends_on:
      interface-manager:
        condition: service_healthy
      sarvam-ai:
        condition: service_started
        required: false
    expose:
      - "7000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - interface_manager_logs:/app/src/app/interface_manager/logs:ro
      - ./config.json:/app/config.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7000/docs', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  sarvam-ai:
    build:
      context: .
      dockerfile: Dockerfile.app-backend
      target: sarvam-ai
    container_name: aiet-sarvam-ai
    restart: unless-stopped
    profiles: ["sarvam"]
    expose:
      - "16000"
    environment:
      - HF_HOME=/models
      - HUGGINGFACE_HUB_TOKEN=${HF_TOKEN}
      - NVIDIA_VISIBLE_DEVICES=all
    env_file:
      - .env
    volumes:
      - sarvam_models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  tdms-backend:
    build:
      context: .
      dockerfile: Dockerfile.app-backend
      target: tdms-backend
    container_name: aiet-tdms-backend
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
    expose:
      - "7250"
    env_file:
      - .env
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:7500}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7250/', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  app-front-end:
    build:
      context: .
      dockerfile: Dockerfile.app-front-end
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-/api}
        REACT_APP_AUTH_SERVICE_URL: ${REACT_APP_AUTH_SERVICE_URL:-/auth}
        REACT_APP_TDMS_API_BASE_URL: ${REACT_APP_TDMS_API_BASE_URL:-/tdms-api}
        REACT_APP_TEST_DATA_URL: ${REACT_APP_TEST_DATA_URL:-/tdms/dashboard}
        REACT_APP_USER_LIST_URL: ${REACT_APP_USER_LIST_URL:-/tdms/users}
    container_name: aiet-app-frontend
    restart: unless-stopped
    depends_on:
      app-backend:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  tdms-frontend:
    build:
      context: .
      dockerfile: Dockerfile.tdms-frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/tdms-api}
        VITE_AUTH_SERVICE_URL: ${VITE_AUTH_SERVICE_URL:-/auth}
        VITE_TEST_RUNS_HOME_URL: ${VITE_TEST_RUNS_HOME_URL:-/}
    container_name: aiet-tdms-frontend
    restart: unless-stopped
    depends_on:
      tdms-backend:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: aiet-nginx
    restart: unless-stopped
    depends_on:
      app-front-end:
        condition: service_started
      tdms-frontend:
        condition: service_started
      app-backend:
        condition: service_healthy
      tdms-backend:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
  interface_manager_logs:
