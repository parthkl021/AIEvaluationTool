map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Block backend API docs
    # location ~ ^/(api|tdms-api|auth)/(docs|redoc|openapi\.json)$ {
    #     return 403;
    # }

    # TCE backend (+ websocket endpoints like /api/... if ever added)
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://app-backend:7000/;
    }

    # TDMS backend (+ /api/importer/ws websocket)
    location /tdms-api/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://tdms-backend:7250/;
    }

    # Auth service under /auth
    location /auth/ {
        proxy_pass http://auth-service:7500;
    }

    # Selenium noVNC
    location /selenium/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://selenium-browser:7900/;
    }

    # TDMS frontend
    location /tdms/ {
        proxy_pass http://tdms-frontend:80/;
    }

    # TCE frontend (root app)
    location / {
        proxy_pass http://app-front-end:80;
    }

    location = /healthz {
        access_log off;
        return 200 "ok";
    }
}
